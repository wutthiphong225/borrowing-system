services:
  web:
    build:
      context: .
      dockerfile: dockerfile
    container_name: borrowing-web
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: equipment_borrowing
      DB_USER: appuser
      DB_PASS: apppassword
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: borrowing-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: equipment_borrowing
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./Database/db.sql:/docker-entrypoint-initdb.d/01-db.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: borrowing-phpmyadmin
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "8081:80"
    restart: unless-stopped

volumes:
  mysql_data:
